---
apiVersion: v1
kind: Secret
metadata:
    name: test-failure-messaging-secret
type: Opaque
data:
    username: <usernameHere>
    password: <passwordHere>

---
apiVersion: extensions/vlbetal
kind: Deployment
metadata:
    anotations:
    labels:
        run: test-failure-messaging
        stack: test-failure-messaging
    name: test-failure-messaging
spec:
    replicas: 1
    selector:
        matchLabels:
            run: test-failure-messaging
    strategy:
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 1
        type: RollingUpdate
    template:
        metadata:
            creationTimestamp: null
            labels:
                run: test-failure-messaging
        spec:
            containers:
            - env:
                - name: JENKINS_USER
                valueFrom:
                    secretKeyRef:
                        name: test-failure-messaging-secret
                        key: username
                - name: JENKINS_PASS
                valueFrom:
                    secretKeyRef:
                        name: test-failure-messaging-secret
                        key: password
                - name: JENKINS_HOST
                value: 0.0.0.0
                image: <nameOfImageHere>
                imagePullPolicy: IfNotPresent
                name: test-failure-messaging
                ports:
                    containerPort: 3000
                    name: node
                    protocol: TCP
                resources: {}
                dnsPolicy: ClusterFirst
                restartPolicy: Always
                schedulerName: default-scheduler
                securityContext: {}
                terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
    annotaions:
        <version of service in kubernetes>
    labels:
        run: test-failure-messaging
        stack: test-failure-messaging
    name: test-failure-messaging-tcp
spec:
    ports:
    - port: 80
      protocol: TCP
      targetPort: 3000
    selector:
        run: test-failure-messaging
    type: LoadBalancer
